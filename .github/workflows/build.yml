name: Build Vivid APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35 + Build Tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Accept licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build Debug APK
        run: |
          cd vivid-app
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --max-workers=2 --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vivid-debug-apk
          path: vivid-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
