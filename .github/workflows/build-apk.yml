name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ============================================
      #  Setup Android SDK + NDK (necesario para Media3)
      # ============================================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-35
            build-tools;35.0.0
            ndk;26.3.11579264
            cmake;3.22.1

      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_SDK_ROOT
          ndk.dir=$ANDROID_NDK_HOME
          EOF
          echo "sdk.dir=$ANDROID_SDK_ROOT"
          echo "ndk.dir=$ANDROID_NDK_HOME"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/*.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ============================================
      #  Build solo DEBUG (mas rapido y suficiente para pruebas)
      # ============================================
      - name: Build Debug APK (sin daemon para evitar errores raros)
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify APK exists
        run: |
          ls -la app/build/outputs/apk/debug/
          if [ ! -f app/build/outputs/apk/debug/*.apk ]; then
            echo "ERROR: No se genero el APK"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vivid-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload to Releases (solo en tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
