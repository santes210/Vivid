# Memoria y estabilidad para compilar en GitHub Actions.
# El error de las capturas era: java.lang.OutOfMemoryError / Gradle daemon disappeared.
# 384m/256m es insuficiente para Android + Kotlin + Compose + Firebase + Hilt.
org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8 -XX:+UseParallelGC -XX:+HeapDumpOnOutOfMemoryError

android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
android.enableJetifier=false

# Más estable en CI: menos procesos paralelos = menos memoria pico.
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.configureondemand=false
org.gradle.caching=true
org.gradle.workers.max=1

# Evita que Kotlin abra daemons extra con su propio heap en runners pequeños.
kotlin.compiler.execution.strategy=in-process
kotlin.incremental=false
ksp.incremental=false
